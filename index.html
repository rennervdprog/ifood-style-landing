  <body style="margin:0;background:#FF6B00">
    <div id="root">
      <!--
        LCP shell — pinta um placeholder discreto até o React montar.
        Usa fundo neutro escuro/claro (acompanha tema do SO via prefers-color-scheme)
        para não "piscar" laranja em telas internas como /pedidos onde o conteúdo
        usa bg-background. Removido pelo main.tsx assim que o React monta.
      -->
      <div id="lcp-shell" style="min-height:100vh;background:#FF6B00;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem 1rem;text-align:center;gap:1rem">
        <div style="display:inline-block;width:28px;height:28px;border:3px solid rgba(255,255,255,.35);border-top-color:#fff;border-radius:50%;animation:lcp-spin .8s linear infinite" role="status" aria-label="Carregando"></div>
      </div>
      <style>
        @keyframes lcp-spin{to{transform:rotate(360deg)}}
      </style>
    </div>
    <script type="module" src="/src/main.tsx"></script>
