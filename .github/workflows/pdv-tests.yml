name: PDV Tests (required)

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  pdv-tests:
    name: Vitest - PDV
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install deps
        run: bun install --frozen-lockfile
      - name: Run PDV test suite
        run: bun run test:pdv