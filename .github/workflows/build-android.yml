name: Build Android APKs

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      app_type:
        description: 'Qual app gerar?'
        required: true
        default: 'both'
        type: choice
        options:
          - cliente
          - parceiro
          - both
          - white_label

      store_slug:
        description: 'Slug da loja (só para white_label)'
        required: false
        type: string

      store_app_name:
        description: 'Nome do app da loja (só para white_label)'
        required: false
        type: string

      store_app_id:
        description: 'App ID ex: app.itasuper.nomedaoja (só para white_label)'
        required: false
        type: string

      icon_url:
        description: 'URL do ícone da loja (PNG 512x512, só white_label)'
        required: false
        type: string

      splash_color:
        description: 'Cor de fundo da splash (hex ex: #FF4B2B, só white_label)'
        required: false
        default: '#FF4B2B'
        type: string

jobs:
  build-cliente:
    if: ${{ github.event.inputs.app_type == 'cliente' || github.event.inputs.app_type == 'both' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: android-actions/setup-android@v4

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Verify Java 21
        run: |
          echo "JAVA_HOME=$JAVA_HOME"
          java -version
          javac -version

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Read target version
        id: version
        run: |
          APP_VERSION=$(grep -oP 'APP_VERSION\s*=\s*"\K[^"]+' src/lib/appVersion.ts)
          ANDROID_VERSION=$(grep -oP 'versionName\s+"\K[^"]+' android/app/build.gradle)
          ANDROID_CODE=$(grep -oP 'versionCode\s+\K[0-9]+' android/app/build.gradle)
          echo "📌 Web version: $APP_VERSION"
          echo "📌 Android version: $ANDROID_VERSION ($ANDROID_CODE)"
          if [ -z "$APP_VERSION" ] || [ -z "$ANDROID_VERSION" ] || [ -z "$ANDROID_CODE" ]; then
            echo "::error::Não consegui ler APP_VERSION/versionName/versionCode"
            exit 1
          fi
          if [ "$APP_VERSION" != "$ANDROID_VERSION" ]; then
            echo "::error::Versões divergentes: APP_VERSION=$APP_VERSION e Android=$ANDROID_VERSION"
            exit 1
          fi
          echo "name=$APP_VERSION" >> "$GITHUB_OUTPUT"
          echo "code=$ANDROID_CODE" >> "$GITHUB_OUTPUT"

      - name: Configure Capacitor for Cliente
        run: |
          cat > capacitor.config.ts << 'EOF'
          import type { CapacitorConfig } from '@capacitor/cli';
          const config: CapacitorConfig = {
            appId: 'app.itasuper.cliente',
            appName: 'ItaSuper',
            webDir: 'dist',
            server: {
              androidScheme: 'https',
              hostname: 'localhost',
              allowNavigation: [
                'app.itasuper.com.br', 
                'lktzrqjvqoojlrhqnxuz.supabase.co', 
                'api.asaas.com.br', 
                'nominatim.openstreetmap.org'
              ],
              cleartext: false
            },
            plugins: {
              SplashScreen: {
                launchAutoHide: false,
                backgroundColor: '#FF4B2B',
                showSpinner: true,
                spinnerColor: '#FFFFFF',
                launchFadeOutDuration: 500,
              },
              CapacitorUpdater: {
                autoUpdate: true,
                autoDeleteFailed: true,
                autoDeletePrevious: true,
                directUpdate: true,
                resetWhenUpdate: true,
                keepUrlPathAfterReload: true,
                updateUrl: 'https://qkjhguziuchqsbxzruea.supabase.co/storage/v1/object/public/app-releases/manifest.json',
                statsUrl: '',
                channelUrl: '',
                publicKey: '',
              },
            },
          };
          export default config;
          EOF
          sed -i 's/^          //' capacitor.config.ts

      - name: Build web app
        run: npm run build
        env:
          VITE_CAPACITOR_APP_MODE: cliente

      - name: Add Android platform
        run: npx cap add android || true

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Guard against stale MainActivity BuildConfig usage
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          for path in Path("android/app/src/main/java").rglob("MainActivity.java"):
              text = path.read_text()
              if "BuildConfig.VERSION_NAME" not in text:
                  continue
              text = text.replace("String currentVersion = BuildConfig.VERSION_NAME;", "String currentVersion = getNativeVersionName();")
              text = re.sub(r"^import .*\.BuildConfig;\n", "", text, flags=re.MULTILINE)
              for imp in ("import android.content.pm.PackageInfo;", "import android.content.pm.PackageManager;"):
                  if imp not in text:
                      text = re.sub(r"(package [^;]+;\n)", rf"\1\n{imp}\n", text, count=1)
              if "private String getNativeVersionName()" not in text:
                  method = '''
              private String getNativeVersionName() {
                  try {
                      PackageInfo packageInfo = getPackageManager().getPackageInfo(getPackageName(), 0);
                      if (packageInfo.versionName != null) return packageInfo.versionName;
                  } catch (PackageManager.NameNotFoundException ignored) {}

                  return "1.9.32";
              }
          '''
                  insert_at = text.rfind("\n}")
                  text = text[:insert_at] + "\n" + method + text[insert_at:]
              path.write_text(text)
              print(f"Patched stale BuildConfig usage in {path}")
          PY
          if grep -R "BuildConfig.VERSION_NAME" android/app/src/main/java; then
            echo "::error::Stale BuildConfig.VERSION_NAME reference remains in MainActivity"
            exit 1
          fi

      - name: Fix package name in build.gradle
        run: |
          # Ensure build.gradle uses the correct applicationId from capacitor.config.ts
          if [ -f "android/app/build.gradle" ]; then
            # Extract appId from capacitor.config.ts
            APP_ID=$(grep -oP "appId: '\K[^']+" capacitor.config.ts || echo "app.itasuper.cliente")
            echo "📱 Setting applicationId to: $APP_ID"
            sed -i "s/applicationId \"app\.lovable\.e8d28aded6334d74be2161c8dbe24765\"/applicationId \"$APP_ID\"/g" android/app/build.gradle
            echo "✅ build.gradle updated with correct package name"
          fi

      - name: Assert Gradle version before build
        run: |
          grep -q "versionName \"${{ steps.version.outputs.name }}\"" android/app/build.gradle
          grep -q "versionCode ${{ steps.version.outputs.code }}" android/app/build.gradle
          echo "✅ Gradle version locked at ${{ steps.version.outputs.name }} (${{ steps.version.outputs.code }})"

      - name: Fix Android app labels (Cliente)
        run: |
          APP_NAME=$(grep -oP "appName: '\K[^']+" capacitor.config.ts || echo "ItaSuper")
          STRINGS_FILE="android/app/src/main/res/values/strings.xml"
          APP_NAME="$APP_NAME" STRINGS_FILE="$STRINGS_FILE" python3 -c "from pathlib import Path; import os, re; path = Path(os.environ['STRINGS_FILE']); text = path.read_text(); app_name = os.environ['APP_NAME']; text = re.sub(r'(<string name=\"app_name\">).*?(</string>)', rf'\\1{app_name}\\2', text); text = re.sub(r'(<string name=\"title_activity_main\">).*?(</string>)', rf'\\1{app_name}\\2', text); path.write_text(text); print(f'✅ Android labels updated to: {app_name}')"

      - name: Inject location, background & push permissions
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          PERMISSIONS='<uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />\n    <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />\n    <uses-permission android:name="android.permission.ACCESS_BACKGROUND_LOCATION" />\n    <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />\n    <uses-permission android:name="android.permission.WAKE_LOCK" />\n    <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />\n    <uses-permission android:name="android.permission.RECEIVE_BOOT_COMPLETED" />'
          # Add permissions before <application
          sed -i "s|<application|<PERMISSIONS_BLOCK\n    <application|" "$MANIFEST"
          sed -i "s|<PERMISSIONS_BLOCK|${PERMISSIONS}|" "$MANIFEST"
          echo "✅ All required permissions injected"

      - name: Inject ItaSuper Cliente icon
        run: |
          ICON="public/icon-cliente.png"
          echo "📥 Injecting Cliente icon from $ICON"
          rm -rf android/app/src/main/res/mipmap-anydpi-v26
          for res in "mipmap-mdpi:48" "mipmap-hdpi:72" "mipmap-xhdpi:96" "mipmap-xxhdpi:144" "mipmap-xxxhdpi:192"; do
            DIR="android/app/src/main/res/${res%%:*}"
            SIZE="${res##*:}"
            mkdir -p "$DIR"
            npx --yes sharp-cli -i "$ICON" -o "$DIR/ic_launcher.png" resize "$SIZE" "$SIZE" 2>/dev/null || \
              convert "$ICON" -resize "${SIZE}x${SIZE}" "$DIR/ic_launcher.png" 2>/dev/null || \
              cp "$ICON" "$DIR/ic_launcher.png"
            cp "$DIR/ic_launcher.png" "$DIR/ic_launcher_round.png"
            cp "$DIR/ic_launcher.png" "$DIR/ic_launcher_foreground.png"
          done
          echo "✅ ItaSuper Cliente icon injected"

      - name: Inject notification sound
        run: |
          RAW_DIR="android/app/src/main/res/raw"
          mkdir -p "$RAW_DIR"
          cp public/sounds/order-bell.mp3 "$RAW_DIR/order_bell.mp3"
          echo "✅ Notification sound injected"

      - name: Set splash color
        run: |
          COLORS_FILE="android/app/src/main/res/values/colors.xml"
          if [ -f "$COLORS_FILE" ]; then
            sed -i 's|</resources>|    <color name="splash_color">#FF4B2B</color>\n</resources>|' "$COLORS_FILE"
          else
            mkdir -p "$(dirname "$COLORS_FILE")"
            echo '<?xml version="1.0" encoding="utf-8"?><resources><color name="splash_color">#FF4B2B</color></resources>' > "$COLORS_FILE"
          fi

      - name: Inject google-services.json (Cliente)
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON_CLIENTE }}' > android/app/google-services.json

      - name: Pin Gradle to Java 21
        run: |
          echo "org.gradle.java.home=$JAVA_HOME" >> android/gradle.properties

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Release APK (unsigned)
        run: cd android && ./gradlew --version && ./gradlew assembleRelease

      - name: Verify and rename APK (Cliente)
        id: apk
        run: |
          APK_PATH="android/app/build/outputs/apk/release/app-release-unsigned.apk"
          if [ ! -f "$APK_PATH" ]; then
             APK_PATH="android/app/build/outputs/apk/release/app-release.apk"
          fi
          AAPT=$(ls "$ANDROID_HOME"/build-tools/*/aapt | sort -V | tail -1)
          BADGING=$($AAPT dump badging "$APK_PATH" | head -1)
          echo "$BADGING"
          if [[ "$BADGING" != *"versionCode='${{ steps.version.outputs.code }}'"* ]]; then
            echo "::error::APK gerado com versionCode incorreto; esperado ${{ steps.version.outputs.code }}"
            exit 1
          fi
          if [[ "$BADGING" != *"versionName='${{ steps.version.outputs.name }}'"* ]]; then
            echo "::error::APK gerado com versionName incorreto; esperado ${{ steps.version.outputs.name }}"
            exit 1
          fi
          OUT="android/app/build/outputs/apk/release/itasuper-cliente-v${{ steps.version.outputs.name }}-${{ steps.version.outputs.code }}.apk"
          cp "$APK_PATH" "$OUT"
          echo "path=$OUT" >> "$GITHUB_OUTPUT"
          echo "✅ APK validado: $OUT"

      - name: Upload Release APK to Supabase Storage
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || secrets.EXTERNAL_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || secrets.EXTERNAL_SUPABASE_SERVICE_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "ℹ️ Secrets do storage ausentes; pulando upload do APK. Artifact do GitHub continua disponível."
            exit 0
          fi
          APK_PATH="${{ steps.apk.outputs.path }}"
          VERSION="${{ steps.version.outputs.name }}"
          VERSION_CODE="${{ steps.version.outputs.code }}"
          
          echo "🚀 Uploading Cliente APK v$VERSION to Supabase..."
          
          # Upload APK
          curl -X POST "${SUPABASE_URL}/storage/v1/object/app-releases/itasuper-cliente.apk" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Content-Type: application/vnd.android.package-archive" \
            -H "x-upsert: true" \
            --data-binary @"$APK_PATH"
            
          # Create metadata
          cat > version-cliente.json << EOF
          {
            "version": "$VERSION",
            "versionCode": $VERSION_CODE,
            "url": "${SUPABASE_URL}/storage/v1/object/public/app-releases/itasuper-cliente.apk",
            "updated_at": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")",
            "app_name": "itasuper-cliente"
          }
          EOF
          
          # Upload metadata
          curl -X POST "${SUPABASE_URL}/storage/v1/object/app-releases/version-cliente.json" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Content-Type: application/json" \
            -H "x-upsert: true" \
            --data-binary @version-cliente.json
            
          echo "✅ Upload complete!"

      - uses: actions/upload-artifact@v7
        with:
          name: itasuper-cliente-v${{ steps.version.outputs.name }}-${{ steps.version.outputs.code }}
          path: ${{ steps.apk.outputs.path }}
          retention-days: 30

  build-parceiro:
    if: ${{ github.event.inputs.app_type == 'parceiro' || github.event.inputs.app_type == 'both' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: android-actions/setup-android@v4

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Verify Java 21
        run: |
          echo "JAVA_HOME=$JAVA_HOME"
          java -version
          javac -version

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Read target version
        id: version
        run: |
          APP_VERSION=$(grep -oP 'APP_VERSION\s*=\s*"\K[^"]+' src/lib/appVersion.ts)
          ANDROID_VERSION=$(grep -oP 'versionName\s+"\K[^"]+' android/app/build.gradle)
          ANDROID_CODE=$(grep -oP 'versionCode\s+\K[0-9]+' android/app/build.gradle)
          echo "📌 Web version: $APP_VERSION"
          echo "📌 Android version: $ANDROID_VERSION ($ANDROID_CODE)"
          if [ -z "$APP_VERSION" ] || [ -z "$ANDROID_VERSION" ] || [ -z "$ANDROID_CODE" ]; then
            echo "::error::Não consegui ler APP_VERSION/versionName/versionCode"
            exit 1
          fi
          if [ "$APP_VERSION" != "$ANDROID_VERSION" ]; then
            echo "::error::Versões divergentes: APP_VERSION=$APP_VERSION e Android=$ANDROID_VERSION"
            exit 1
          fi
          echo "name=$APP_VERSION" >> "$GITHUB_OUTPUT"
          echo "code=$ANDROID_CODE" >> "$GITHUB_OUTPUT"

      - name: Configure Capacitor for Parceiro
        run: |
          cat > capacitor.config.ts << 'EOF'
          import type { CapacitorConfig } from '@capacitor/cli';
          const config: CapacitorConfig = {
            appId: 'app.itasuper.parceiro',
            appName: 'ItaSuper Parceiro',
            webDir: 'dist',
            server: {
              androidScheme: 'https',
              hostname: 'localhost',
              allowNavigation: [
                'app.itasuper.com.br', 
                'lktzrqjvqoojlrhqnxuz.supabase.co', 
                'api.asaas.com.br', 
                'nominatim.openstreetmap.org'
              ],
              cleartext: false
            },
            plugins: {
              SplashScreen: {
                launchAutoHide: false,
              },
              CapacitorUpdater: {
                autoUpdate: true,
                autoDeleteFailed: true,
                autoDeletePrevious: true,
                directUpdate: true,
                resetWhenUpdate: true,
                keepUrlPathAfterReload: true,
                updateUrl: 'https://qkjhguziuchqsbxzruea.supabase.co/storage/v1/object/public/app-releases/manifest.json',
                statsUrl: '',
                channelUrl: '',
                publicKey: '',
              },
            },
          };
          export default config;
          EOF
          sed -i 's/^          //' capacitor.config.ts

      - name: Build web app
        run: npm run build
        env:
          VITE_CAPACITOR_APP_MODE: parceiro

      - name: Add Android platform
        run: npx cap add android || true

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Guard against stale MainActivity BuildConfig usage
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          for path in Path("android/app/src/main/java").rglob("MainActivity.java"):
              text = path.read_text()
              if "BuildConfig.VERSION_NAME" not in text:
                  continue
              text = text.replace("String currentVersion = BuildConfig.VERSION_NAME;", "String currentVersion = getNativeVersionName();")
              text = re.sub(r"^import .*\.BuildConfig;\n", "", text, flags=re.MULTILINE)
              for imp in ("import android.content.pm.PackageInfo;", "import android.content.pm.PackageManager;"):
                  if imp not in text:
                      text = re.sub(r"(package [^;]+;\n)", rf"\1\n{imp}\n", text, count=1)
              if "private String getNativeVersionName()" not in text:
                  method = '''
              private String getNativeVersionName() {
                  try {
                      PackageInfo packageInfo = getPackageManager().getPackageInfo(getPackageName(), 0);
                      if (packageInfo.versionName != null) return packageInfo.versionName;
                  } catch (PackageManager.NameNotFoundException ignored) {}

                  return "1.9.32";
              }
          '''
                  insert_at = text.rfind("\n}")
                  text = text[:insert_at] + "\n" + method + text[insert_at:]
              path.write_text(text)
              print(f"Patched stale BuildConfig usage in {path}")
          PY
          if grep -R "BuildConfig.VERSION_NAME" android/app/src/main/java; then
            echo "::error::Stale BuildConfig.VERSION_NAME reference remains in MainActivity"
            exit 1
          fi

      - name: Fix package name in build.gradle
        run: |
          # Ensure build.gradle uses the correct applicationId from capacitor.config.ts
          if [ -f "android/app/build.gradle" ]; then
            # Extract appId from capacitor.config.ts
            APP_ID=$(grep -oP "appId: '\K[^']+" capacitor.config.ts || echo "app.itasuper.parceiro")
            echo "📱 Setting applicationId to: $APP_ID"
            sed -i "s/applicationId \"app\.lovable\.e8d28aded6334d74be2161c8dbe24765\"/applicationId \"$APP_ID\"/g" android/app/build.gradle
            echo "✅ build.gradle updated with correct package name"
          fi

      - name: Assert Gradle version before build
        run: |
          grep -q "versionName \"${{ steps.version.outputs.name }}\"" android/app/build.gradle
          grep -q "versionCode ${{ steps.version.outputs.code }}" android/app/build.gradle
          echo "✅ Gradle version locked at ${{ steps.version.outputs.name }} (${{ steps.version.outputs.code }})"

      - name: Fix Android app labels (Parceiro)
        run: |
          APP_NAME=$(grep -oP "appName: '\K[^']+" capacitor.config.ts || echo "ItaSuper Parceiro")
          STRINGS_FILE="android/app/src/main/res/values/strings.xml"
          APP_NAME="$APP_NAME" STRINGS_FILE="$STRINGS_FILE" python3 -c "from pathlib import Path; import os, re; path = Path(os.environ['STRINGS_FILE']); text = path.read_text(); app_name = os.environ['APP_NAME']; text = re.sub(r'(<string name=\"app_name\">).*?(</string>)', rf'\\1{app_name}\\2', text); text = re.sub(r'(<string name=\"title_activity_main\">).*?(</string>)', rf'\\1{app_name}\\2', text); path.write_text(text); print(f'✅ Android labels updated to: {app_name}')"

      - name: Inject location & camera permissions
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          if ! grep -q "ACCESS_FINE_LOCATION" "$MANIFEST"; then
            sed -i 's|<application|<uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />\n    <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />\n    <application|' "$MANIFEST"
            echo "✅ Location permissions injected"
          else
            echo "ℹ️ Location permissions already present"
          fi

      - name: Inject ItaSuper Parceiro icon
