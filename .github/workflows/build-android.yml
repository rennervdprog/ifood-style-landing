            cp "$DIR/ic_launcher.png" "$DIR/ic_launcher_round.png"
            cp "$DIR/ic_launcher.png" "$DIR/ic_launcher_foreground.png"
          done
          echo "✅ ItaSuper Parceiro icon injected"

      - name: Inject notification sound
        run: |
          RAW_DIR="android/app/src/main/res/raw"
          mkdir -p "$RAW_DIR"
          cp public/sounds/order-bell.mp3 "$RAW_DIR/order_bell.mp3"
          echo "✅ Notification sound injected"

      - name: Set splash color
        run: |
          COLORS_FILE="android/app/src/main/res/values/colors.xml"
          if [ -f "$COLORS_FILE" ]; then
            sed -i 's|</resources>|    <color name="splash_color">#FF4B2B</color>\n</resources>|' "$COLORS_FILE"
          else
            mkdir -p "$(dirname "$COLORS_FILE")"
            echo '<?xml version="1.0" encoding="utf-8"?><resources><color name="splash_color">#FF4B2B</color></resources>' > "$COLORS_FILE"
          fi

      - name: Inject google-services.json (Parceiro)
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON_PARCEIRO }}' > android/app/google-services.json

      - name: Pin Gradle to Java 21
        run: |
          echo "org.gradle.java.home=$JAVA_HOME" >> android/gradle.properties

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Decode signing keystore (Parceiro)
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/itasuper-parceiro.keystore
          echo "✅ Keystore decoded ($(wc -c < android/app/itasuper-parceiro.keystore) bytes)"

      - name: Build Release APK (signed if keystore present)
        env:
          ANDROID_KEYSTORE_PATH: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' && 'itasuper-parceiro.keystore' || '' }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: cd android && ./gradlew --version && ./gradlew assembleRelease

      - name: Verify and rename APK (Parceiro)
        id: apk
        run: |
          APK_PATH="android/app/build/outputs/apk/release/app-release.apk"
          AAPT=$(ls "$ANDROID_HOME"/build-tools/*/aapt | sort -V | tail -1)
          BADGING=$($AAPT dump badging "$APK_PATH" | head -1)
          echo "$BADGING"
          if [[ "$BADGING" != *"versionCode='${{ steps.version.outputs.code }}'"* ]]; then
            echo "::error::APK gerado com versionCode incorreto; esperado ${{ steps.version.outputs.code }}"
            exit 1
          fi
          if [[ "$BADGING" != *"versionName='${{ steps.version.outputs.name }}'"* ]]; then
            echo "::error::APK gerado com versionName incorreto; esperado ${{ steps.version.outputs.name }}"
            exit 1
          fi
          OUT="android/app/build/outputs/apk/release/itasuper-parceiro-v${{ steps.version.outputs.name }}-${{ steps.version.outputs.code }}.apk"
          cp "$APK_PATH" "$OUT"
          echo "path=$OUT" >> "$GITHUB_OUTPUT"
          echo "✅ APK validado: $OUT"

      - name: Upload Release APK to Supabase Storage
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || secrets.EXTERNAL_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || secrets.EXTERNAL_SUPABASE_SERVICE_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "ℹ️ Secrets do storage ausentes; pulando upload do APK. Artifact do GitHub continua disponível."
            exit 0
          fi
          APK_PATH="${{ steps.apk.outputs.path }}"
          VERSION="${{ steps.version.outputs.name }}"
          VERSION_CODE="${{ steps.version.outputs.code }}"
          
          echo "🚀 Uploading Parceiro APK v$VERSION to Supabase..."
          
          # Upload APK
          curl -X POST "${SUPABASE_URL}/storage/v1/object/app-releases/itasuper-parceiro.apk" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Content-Type: application/vnd.android.package-archive" \
            -H "x-upsert: true" \
            --data-binary @"$APK_PATH"
            
          # Create metadata
          cat > version-parceiro.json << EOF
          {
            "version": "$VERSION",
            "versionCode": $VERSION_CODE,
            "url": "${SUPABASE_URL}/storage/v1/object/public/app-releases/itasuper-parceiro.apk",
            "updated_at": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")",
            "app_name": "itasuper-parceiro"
          }
          EOF
          
          # Upload metadata
          curl -X POST "${SUPABASE_URL}/storage/v1/object/app-releases/version-parceiro.json" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Content-Type: application/json" \
            -H "x-upsert: true" \
            --data-binary @version-parceiro.json
            
          echo "✅ Upload complete!"

      - uses: actions/upload-artifact@v7
        with:
          name: itasuper-parceiro-v${{ steps.version.outputs.name }}-${{ steps.version.outputs.code }}
          path: ${{ steps.apk.outputs.path }}
          retention-days: 30

  build-white-label:
    if: ${{ github.event.inputs.app_type == 'white_label' }}
    runs-on: ubuntu-latest
    steps:
      - name: Validate inputs
        run: |
          if [ -z "${{ github.event.inputs.store_slug }}" ]; then
            echo "::error::store_slug é obrigatório para white_label"
            exit 1
          fi
          if [ -z "${{ github.event.inputs.store_app_name }}" ]; then
            echo "::error::store_app_name é obrigatório para white_label"
            exit 1
          fi
          if [ -z "${{ github.event.inputs.store_app_id }}" ]; then
            echo "::error::store_app_id é obrigatório para white_label"
            exit 1
          fi

      - uses: actions/checkout@v6

      - uses: android-actions/setup-android@v4

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Verify Java 21
        run: |
          echo "JAVA_HOME=$JAVA_HOME"
          java -version
          javac -version

      - name: Install dependencies
        run: npm install

      - name: Configure Capacitor for Store
        env:
          STORE_SLUG: ${{ github.event.inputs.store_slug }}
          STORE_APP_NAME: ${{ github.event.inputs.store_app_name }}
          STORE_APP_ID: ${{ github.event.inputs.store_app_id }}
          SPLASH_COLOR: ${{ github.event.inputs.splash_color || '#FF4B2B' }}
        run: |
          cat > capacitor.config.ts << EOF
          import type { CapacitorConfig } from '@capacitor/cli';
          const config: CapacitorConfig = {
            appId: '${STORE_APP_ID}',
            appName: '${STORE_APP_NAME}',
            webDir: 'dist',
            server: {
              androidScheme: 'https',
              hostname: 'localhost',
              allowNavigation: [
                'app.itasuper.com.br', 
                'lktzrqjvqoojlrhqnxuz.supabase.co', 
                'api.asaas.com.br', 
                'nominatim.openstreetmap.org'
              ],
              cleartext: false
            },
            plugins: {
              SplashScreen: {
                launchAutoHide: false,
                backgroundColor: '${SPLASH_COLOR}',
                showSpinner: true,
                spinnerColor: '#FFFFFF',
                launchFadeOutDuration: 500,
              },
            },
          };
          export default config;
          EOF

      - name: Resolve store icon URL
        id: resolve_icon
        env:
          ICON_URL: ${{ github.event.inputs.icon_url }}
          STORE_SLUG: ${{ github.event.inputs.store_slug }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          if [ -n "$ICON_URL" ]; then
            echo "📌 Using manual icon URL"
            echo "icon_url=$ICON_URL" >> "$GITHUB_OUTPUT"
          else
            echo "🔍 Fetching store image_url from database (slug=$STORE_SLUG)..."
            RESPONSE=$(curl -s \
              "${SUPABASE_URL}/rest/v1/stores?slug=eq.${STORE_SLUG}&select=image_url&limit=1" \
              -H "apikey: ${SUPABASE_ANON_KEY}" \
              -H "Authorization: Bearer ${SUPABASE_ANON_KEY}")
            
            STORE_IMAGE=$(echo "$RESPONSE" | node -e "
              const d = JSON.parse(require('fs').readFileSync(0,'utf8'));
              const url = d?.[0]?.image_url || '';
              process.stdout.write(url);
            " 2>/dev/null || echo "")
            
            if [ -n "$STORE_IMAGE" ]; then
              echo "✅ Found store image: ${STORE_IMAGE:0:60}..."
              echo "icon_url=$STORE_IMAGE" >> "$GITHUB_OUTPUT"
            else
              echo "⚠️ No store image found, using default icon"
              echo "icon_url=" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Download custom icon
        if: ${{ steps.resolve_icon.outputs.icon_url != '' }}
        env:
          ICON_URL: ${{ steps.resolve_icon.outputs.icon_url }}
        run: |
          echo "📥 Downloading store icon from $ICON_URL"
          curl -L -o /tmp/store-icon.png "$ICON_URL"
          echo "✅ Icon downloaded to /tmp/store-icon.png"

      - name: Build web app
        run: npm run build

      - name: Ensure Android platform exists
        run: |
          if [ ! -f "android/app/src/main/AndroidManifest.xml" ]; then
            rm -rf android
            npx cap add android
          fi
          test -f "android/app/src/main/AndroidManifest.xml"

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Guard against stale MainActivity BuildConfig usage
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          for path in Path("android/app/src/main/java").rglob("MainActivity.java"):
              text = path.read_text()
              if "BuildConfig.VERSION_NAME" not in text:
                  continue
              text = text.replace("String currentVersion = BuildConfig.VERSION_NAME;", "String currentVersion = getNativeVersionName();")
              text = re.sub(r"^import .*\.BuildConfig;\n", "", text, flags=re.MULTILINE)
              for imp in ("import android.content.pm.PackageInfo;", "import android.content.pm.PackageManager;"):
                  if imp not in text:
                      text = re.sub(r"(package [^;]+;\n)", rf"\1\n{imp}\n", text, count=1)
              if "private String getNativeVersionName()" not in text:
                  method = '''
              private String getNativeVersionName() {
                  try {
                      PackageInfo packageInfo = getPackageManager().getPackageInfo(getPackageName(), 0);
                      if (packageInfo.versionName != null) return packageInfo.versionName;
                  } catch (PackageManager.NameNotFoundException ignored) {}

                  return "1.9.32";
              }
          '''
                  insert_at = text.rfind("\n}")
                  text = text[:insert_at] + "\n" + method + text[insert_at:]
              path.write_text(text)
              print(f"Patched stale BuildConfig usage in {path}")
          PY
          if grep -R "BuildConfig.VERSION_NAME" android/app/src/main/java; then
            echo "::error::Stale BuildConfig.VERSION_NAME reference remains in MainActivity"
            exit 1
          fi

      - name: Fix package name in build.gradle (White Label)
        env:
          STORE_APP_ID: ${{ github.event.inputs.store_app_id }}
        run: |
          # Ensure build.gradle uses the correct applicationId from capacitor.config.ts or inputs
          if [ -f "android/app/build.gradle" ]; then
            APP_ID="${STORE_APP_ID:-$(grep -oP "appId: '\K[^']+" capacitor.config.ts)}"
            echo "📱 Setting applicationId to: $APP_ID"
            sed -i "s/applicationId \"app\.lovable\.e8d28aded6334d74be2161c8dbe24765\"/applicationId \"$APP_ID\"/g" android/app/build.gradle
            echo "✅ build.gradle updated with correct package name"
          fi

      - name: Inject location & camera permissions
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          if [ ! -f "$MANIFEST" ]; then
            echo "⚠️ AndroidManifest.xml ausente após o sync, recriando plataforma Android..."
            rm -rf android
            npx cap add android
            npx cap sync android
          fi
          if [ ! -f "$MANIFEST" ]; then
            echo "::error::AndroidManifest.xml não foi gerado pelo Capacitor"
            ls -la android || true
            exit 1
          fi
          if ! grep -q "ACCESS_FINE_LOCATION" "$MANIFEST"; then
            sed -i 's|<application|<uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />\n    <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />\n    <application|' "$MANIFEST"
            echo "✅ Location permissions injected"
          else
            echo "ℹ️ Location permissions already present"
          fi

      - name: Inject icons after sync
        if: ${{ steps.resolve_icon.outputs.icon_url != '' }}
        run: |
          echo "📥 Re-injecting icons after cap sync..."
          rm -rf android/app/src/main/res/mipmap-anydpi-v26
          for res in "mipmap-mdpi:48" "mipmap-hdpi:72" "mipmap-xhdpi:96" "mipmap-xxhdpi:144" "mipmap-xxxhdpi:192"; do
            DIR="android/app/src/main/res/${res%%:*}"
            SIZE="${res##*:}"
            mkdir -p "$DIR"
            convert /tmp/store-icon.png -resize "${SIZE}x${SIZE}" "$DIR/ic_launcher.png"
            cp "$DIR/ic_launcher.png" "$DIR/ic_launcher_round.png"
            cp "$DIR/ic_launcher.png" "$DIR/ic_launcher_foreground.png"
          done
          echo "✅ Icons re-injected after sync"

      - name: Inject notification sound
        run: |
          RAW_DIR="android/app/src/main/res/raw"
          mkdir -p "$RAW_DIR"
          cp public/sounds/order-bell.mp3 "$RAW_DIR/order_bell.mp3"
          echo "✅ Notification sound injected"

      - name: Apply splash color after sync
        env:
          SPLASH_COLOR: ${{ github.event.inputs.splash_color || '#FF4B2B' }}
        run: |
          COLORS_FILE="android/app/src/main/res/values/colors.xml"
          if [ -f "$COLORS_FILE" ]; then
            if grep -q "splash_color" "$COLORS_FILE"; then
              sed -i "s|<color name=\"splash_color\">.*</color>|<color name=\"splash_color\">${SPLASH_COLOR}</color>|" "$COLORS_FILE"
            else
              sed -i "s|</resources>|    <color name=\"splash_color\">${SPLASH_COLOR}</color>\n</resources>|" "$COLORS_FILE"
            fi
          else
            cat > "$COLORS_FILE" << COLEOF
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="splash_color">${SPLASH_COLOR}</color>
          </resources>
          COLEOF
          fi

      - name: Inject google-services.json (White Label)
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON_CLIENTE }}' > android/app/google-services.json

      - name: Pin Gradle to Java 21
        run: |
          echo "org.gradle.java.home=$JAVA_HOME" >> android/gradle.properties

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Debug APK
        run: cd android && ./gradlew --version && ./gradlew assembleDebug

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ github.event.inputs.store_slug }}-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
