name: Build Android APKs (Cliente + Parceiro)

on:
  workflow_dispatch:
    inputs:
      app_type:
        description: 'Qual app gerar?'
        required: true
        default: 'both'
        type: choice
        options:
          - cliente
          - parceiro
          - both

jobs:
  build-cliente:
    if: ${{ github.event.inputs.app_type == 'cliente' || github.event.inputs.app_type == 'both' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: android-actions/setup-android@v3

      - uses: actions/setup-node@v5
        with:
          node-version: '22'

      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install dependencies
        run: npm install

      - name: Configure Capacitor for Cliente
        run: |
          cat > capacitor.config.ts << 'EOF'
          import type { CapacitorConfig } from '@capacitor/cli';
          const config: CapacitorConfig = {
            appId: 'app.itasuper.cliente',
            appName: 'ItaSuper',
            webDir: 'dist',
          };
          export default config;
          EOF

      - name: Build web app
        run: npm run build

      - name: Add Android platform
        run: npx cap add android || true

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build APK
        run: cd android && ./gradlew assembleDebug

      - uses: actions/upload-artifact@v4
        with:
          name: itasuper-cliente-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

  build-parceiro:
    if: ${{ github.event.inputs.app_type == 'parceiro' || github.event.inputs.app_type == 'both' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: android-actions/setup-android@v3

      - uses: actions/setup-node@v5
        with:
          node-version: '22'

      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install dependencies
        run: npm install

      - name: Configure Capacitor for Parceiro
        run: |
          cat > capacitor.config.ts << 'EOF'
          import type { CapacitorConfig } from '@capacitor/cli';
          const config: CapacitorConfig = {
            appId: 'app.itasuper.parceiro',
            appName: 'ItaSuper Parceiro',
            webDir: 'dist',
            plugins: {
              SplashScreen: {
                launchAutoHide: false,
              },
            },
          };
          export default config;
          EOF

      - name: Inject partner redirect
        run: |
          sed -i 's|<head>|<head><script>if(!window.__CAP_PARTNER_REDIRECTED && window.location.pathname==="/"){window.__CAP_PARTNER_REDIRECTED=true;window.location.replace("/portal-parceiro");}</script>|' index.html

      - name: Build web app
        run: npm run build

      - name: Add Android platform
        run: npx cap add android || true

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build APK
        run: cd android && ./gradlew assembleDebug

      - uses: actions/upload-artifact@v4
        with:
          name: itasuper-parceiro-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
