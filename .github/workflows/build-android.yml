name: Build Android APKs (Cliente + Parceiro)

on:
  workflow_dispatch:
    inputs:
      app_type:
        description: 'Qual app gerar?'
        required: true
        default: 'both'
        type: choice
        options:
          - cliente
          - parceiro
          - both

jobs:
  build-cliente:
    if: ${{ github.event.inputs.app_type == 'cliente' || github.event.inputs.app_type == 'both' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: android-actions/setup-android@v3

      - uses: actions/setup-node@v5
        with:
          node-version: '22'

      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Verify Java 21
        run: |
          echo "JAVA_HOME=$JAVA_HOME"
          java -version
          javac -version

      - name: Install dependencies
        run: npm install

      - name: Decode Android signing keystore (Cliente)
        run: |
          if [ -z "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ]; then
            echo "Missing ANDROID_KEYSTORE_BASE64 secret" >&2
            exit 1
          fi
          echo '${{ secrets.ANDROID_KEYSTORE_BASE64 }}' | base64 --decode > $RUNNER_TEMP/release.keystore

      - name: Configure Capacitor for Cliente
        run: |
          cat > capacitor.config.ts << 'EOF'
          import type { CapacitorConfig } from '@capacitor/cli';
          const config: CapacitorConfig = {
            appId: 'app.itasuper.cliente',
            appName: 'ItaSuper',
            webDir: 'dist',
            server: {
              url: 'https://itasuper.com.br',
              cleartext: false
            }
          };
          export default config;
          EOF
          sed -i 's/^          //' capacitor.config.ts

      - name: Build web app
        run: npm run build

      - name: Add Android platform
        run: npx cap add android || true

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Inject google-services.json (Cliente)
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON_CLIENTE }}' > android/app/google-services.json

      - name: Pin Gradle to Java 21
        run: |
          echo "org.gradle.java.home=$JAVA_HOME" >> android/gradle.properties

      - name: Configure Android signing (Cliente)
        run: |
          cat >> android/gradle.properties <<EOF
          ITASUPER_UPLOAD_STORE_FILE=$RUNNER_TEMP/release.keystore
          ITASUPER_UPLOAD_STORE_PASSWORD=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ITASUPER_UPLOAD_KEY_ALIAS=${{ secrets.ANDROID_KEY_ALIAS }}
          ITASUPER_UPLOAD_KEY_PASSWORD=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF

      - name: Harden Android defaults for modern Samsung devices (Cliente)
        run: |
          cat > android/variables.gradle <<'EOF'
          ext {
              minSdkVersion = 26
              compileSdkVersion = 36
              targetSdkVersion = 36
              androidxActivityVersion = '1.11.0'
              androidxAppCompatVersion = '1.7.1'
              androidxCoordinatorLayoutVersion = '1.3.0'
              androidxCoreVersion = '1.17.0'
              androidxFragmentVersion = '1.8.9'
              androidxWebkitVersion = '1.14.0'
              junitVersion = '4.13.2'
              androidxJunitVersion = '1.3.0'
              androidxEspressoCoreVersion = '3.7.0'
              cordovaAndroidVersion = '14.0.1'
          }
          EOF

      - name: Add release signing config (Cliente)
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('android/app/build.gradle')
          text = path.read_text()
          if 'signingConfigs {' not in text:
              text = text.replace('android {\n', 'android {\n    signingConfigs {\n        release {\n            storeFile file(ITASUPER_UPLOAD_STORE_FILE)\n            storePassword ITASUPER_UPLOAD_STORE_PASSWORD\n            keyAlias ITASUPER_UPLOAD_KEY_ALIAS\n            keyPassword ITASUPER_UPLOAD_KEY_PASSWORD\n        }\n    }\n')
          text = text.replace('        release {\n            minifyEnabled false\n            proguardFiles getDefaultProguardFile(\'proguard-android-optimize.txt\'), \'proguard-rules.pro\'\n        }', '        release {\n            minifyEnabled false\n            shrinkResources false\n            signingConfig signingConfigs.release\n            proguardFiles getDefaultProguardFile(\'proguard-android-optimize.txt\'), \'proguard-rules.pro\'\n        }')
          path.write_text(text)
          PY

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build APK
        run: cd android && ./gradlew --version && ./gradlew assembleRelease

      - uses: actions/upload-artifact@v4
        with:
          name: itasuper-cliente-release
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30

  build-parceiro:
    if: ${{ github.event.inputs.app_type == 'parceiro' || github.event.inputs.app_type == 'both' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: android-actions/setup-android@v3

      - uses: actions/setup-node@v5
        with:
          node-version: '22'

      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Verify Java 21
        run: |
          echo "JAVA_HOME=$JAVA_HOME"
          java -version
          javac -version

      - name: Install dependencies
        run: npm install

      - name: Decode Android signing keystore (Parceiro)
        run: |
          if [ -z "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ]; then
            echo "Missing ANDROID_KEYSTORE_BASE64 secret" >&2
            exit 1
          fi
          echo '${{ secrets.ANDROID_KEYSTORE_BASE64 }}' | base64 --decode > $RUNNER_TEMP/release.keystore

      - name: Configure Capacitor for Parceiro
        run: |
          cat > capacitor.config.ts << 'EOF'
          import type { CapacitorConfig } from '@capacitor/cli';
          const config: CapacitorConfig = {
            appId: 'app.itasuper.parceiro',
            appName: 'ItaSuper Parceiro',
            webDir: 'dist',
            server: {
              url: 'https://itasuper.com.br',
              cleartext: false
            },
            plugins: {
              SplashScreen: {
                launchAutoHide: false,
              },
            },
          };
          export default config;
          EOF
          sed -i 's/^          //' capacitor.config.ts

      - name: Inject partner redirect
        run: |
          node -e "
          const fs = require('fs');
          let html = fs.readFileSync('index.html','utf8');
          const tag = '<script>if(!window.__CAP_PARTNER_REDIRECTED){var p=window.location.pathname;if(p===\"/\"||p===\"/index.html\"||p===\"\"){window.__CAP_PARTNER_REDIRECTED=true;window.location.replace(\"/portal-parceiro\");}}</script>';
          html = html.replace('<head>','<head>'+tag);
          fs.writeFileSync('index.html',html);
          "

      - name: Build web app
        run: npm run build

      - name: Add Android platform
        run: npx cap add android || true

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Inject google-services.json (Parceiro)
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON_PARCEIRO }}' > android/app/google-services.json

      - name: Pin Gradle to Java 21
        run: |
          echo "org.gradle.java.home=$JAVA_HOME" >> android/gradle.properties

      - name: Configure Android signing (Parceiro)
        run: |
          cat >> android/gradle.properties <<EOF
          ITASUPER_UPLOAD_STORE_FILE=$RUNNER_TEMP/release.keystore
          ITASUPER_UPLOAD_STORE_PASSWORD=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ITASUPER_UPLOAD_KEY_ALIAS=${{ secrets.ANDROID_KEY_ALIAS }}
          ITASUPER_UPLOAD_KEY_PASSWORD=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF

      - name: Harden Android defaults for modern Samsung devices (Parceiro)
        run: |
          cat > android/variables.gradle <<'EOF'
          ext {
              minSdkVersion = 26
              compileSdkVersion = 36
              targetSdkVersion = 36
              androidxActivityVersion = '1.11.0'
              androidxAppCompatVersion = '1.7.1'
              androidxCoordinatorLayoutVersion = '1.3.0'
              androidxCoreVersion = '1.17.0'
              androidxFragmentVersion = '1.8.9'
              androidxWebkitVersion = '1.14.0'
              junitVersion = '4.13.2'
              androidxJunitVersion = '1.3.0'
              androidxEspressoCoreVersion = '3.7.0'
              cordovaAndroidVersion = '14.0.1'
          }
          EOF

      - name: Add release signing config (Parceiro)
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('android/app/build.gradle')
          text = path.read_text()
          if 'signingConfigs {' not in text:
              text = text.replace('android {\n', 'android {\n    signingConfigs {\n        release {\n            storeFile file(ITASUPER_UPLOAD_STORE_FILE)\n            storePassword ITASUPER_UPLOAD_STORE_PASSWORD\n            keyAlias ITASUPER_UPLOAD_KEY_ALIAS\n            keyPassword ITASUPER_UPLOAD_KEY_PASSWORD\n        }\n    }\n')
          text = text.replace('        release {\n            minifyEnabled false\n            proguardFiles getDefaultProguardFile(\'proguard-android-optimize.txt\'), \'proguard-rules.pro\'\n        }', '        release {\n            minifyEnabled false\n            shrinkResources false\n            signingConfig signingConfigs.release\n            proguardFiles getDefaultProguardFile(\'proguard-android-optimize.txt\'), \'proguard-rules.pro\'\n        }')
          path.write_text(text)
          PY

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build APK
        run: cd android && ./gradlew --version && ./gradlew assembleRelease

      - uses: actions/upload-artifact@v4
        with:
          name: itasuper-parceiro-release
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
