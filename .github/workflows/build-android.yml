name: Build Android APK (Signed Release)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: npm install

      - name: Build web app
        run: npm run build

      - name: Add Android platform
        run: npx cap add android || true

      - name: Remove server URL for production
        run: |
          sed -i 's|url:.*|// removed for production|' capacitor.config.ts
          sed -i 's|cleartext:.*|// removed for production|' capacitor.config.ts

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate keystore (if not provided as secret)
        run: |
          if [ -z "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            keytool -genkeypair \
              -v \
              -storetype PKCS12 \
              -keystore android/app/itasuper-release.keystore \
              -alias itasuper \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -storepass itasuper123 \
              -keypass itasuper123 \
              -dname "CN=ItaSuper, OU=App, O=ItaSuper, L=Itatinga, ST=SP, C=BR"
            echo "STORE_PASSWORD=itasuper123" >> $GITHUB_ENV
            echo "KEY_PASSWORD=itasuper123" >> $GITHUB_ENV
            echo "KEY_ALIAS=itasuper" >> $GITHUB_ENV
          else
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/itasuper-release.keystore
            echo "STORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> $GITHUB_ENV
            echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> $GITHUB_ENV
            echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> $GITHUB_ENV
          fi

      - name: Configure signing in build.gradle
        run: |
          cd android/app
          sed -i '/android {/a \
              signingConfigs {\
                  release {\
                      storeFile file("itasuper-release.keystore")\
                      storePassword System.getenv("STORE_PASSWORD") ?: "itasuper123"\
                      keyAlias System.getenv("KEY_ALIAS") ?: "itasuper"\
                      keyPassword System.getenv("KEY_PASSWORD") ?: "itasuper123"\
                  }\
              }' build.gradle
          sed -i 's/signingConfig signingConfigs.debug/signingConfig signingConfigs.release/' build.gradle

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build signed release APK
        run: cd android && ./gradlew assembleRelease

      - name: Upload signed APK
        uses: actions/upload-artifact@v4
        with:
          name: itasuper-release-signed
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 90
