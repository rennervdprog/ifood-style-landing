name: Build Android APKs

on:
  workflow_dispatch:
    inputs:
      app_type:
        description: 'Qual app gerar?'
        required: true
        default: 'both'
        type: choice
        options:
          - cliente
          - parceiro
          - both
          - white_label

      store_slug:
        description: 'Slug da loja (só para white_label)'
        required: false
        type: string

      store_app_name:
        description: 'Nome do app da loja (só para white_label)'
        required: false
        type: string

      store_app_id:
        description: 'App ID ex: app.itasuper.nomedaoja (só para white_label)'
        required: false
        type: string

      icon_url:
        description: 'URL do ícone da loja (PNG 512x512, só white_label)'
        required: false
        type: string

      splash_color:
        description: 'Cor de fundo da splash (hex ex: #FF4B2B, só white_label)'
        required: false
        default: '#FF4B2B'
        type: string

jobs:
  build-cliente:
    if: ${{ github.event.inputs.app_type == 'cliente' || github.event.inputs.app_type == 'both' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: android-actions/setup-android@v3

      - uses: actions/setup-node@v5
        with:
          node-version: '22'

      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Verify Java 21
        run: |
          echo "JAVA_HOME=$JAVA_HOME"
          java -version
          javac -version

      - name: Install dependencies
        run: npm install

      - name: Configure Capacitor for Cliente
        run: |
          cat > capacitor.config.ts << 'EOF'
          import type { CapacitorConfig } from '@capacitor/cli';
          const config: CapacitorConfig = {
            appId: 'app.itasuper.cliente',
            appName: 'ItaSuper',
            webDir: 'dist',
            server: {
              url: 'https://itasuper.com.br',
              cleartext: false
            }
          };
          export default config;
          EOF
          sed -i 's/^          //' capacitor.config.ts

      - name: Build web app
        run: npm run build

      - name: Add Android platform
        run: npx cap add android || true

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Inject ItaSuper icon
        run: |
          echo "📥 Injecting ItaSuper icon from public/icon-512x512.png"
          for res in "mipmap-mdpi:48" "mipmap-hdpi:72" "mipmap-xhdpi:96" "mipmap-xxhdpi:144" "mipmap-xxxhdpi:192"; do
            DIR="android/app/src/main/res/${res%%:*}"
            SIZE="${res##*:}"
            mkdir -p "$DIR"
            npx --yes sharp-cli -i public/icon-512x512.png -o "$DIR/ic_launcher.png" resize "$SIZE" "$SIZE" 2>/dev/null || \
              convert public/icon-512x512.png -resize "${SIZE}x${SIZE}" "$DIR/ic_launcher.png" 2>/dev/null || \
              cp public/icon-512x512.png "$DIR/ic_launcher.png"
            cp "$DIR/ic_launcher.png" "$DIR/ic_launcher_round.png"
            cp "$DIR/ic_launcher.png" "$DIR/ic_launcher_foreground.png"
          done
          echo "✅ ItaSuper icon injected"

      - name: Set splash color
        run: |
          COLORS_FILE="android/app/src/main/res/values/colors.xml"
          if [ -f "$COLORS_FILE" ]; then
            sed -i 's|</resources>|    <color name="splash_color">#FF4B2B</color>\n</resources>|' "$COLORS_FILE"
          else
            mkdir -p "$(dirname "$COLORS_FILE")"
            echo '<?xml version="1.0" encoding="utf-8"?><resources><color name="splash_color">#FF4B2B</color></resources>' > "$COLORS_FILE"
          fi

      - name: Inject google-services.json (Cliente)
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON_CLIENTE }}' > android/app/google-services.json

      - name: Pin Gradle to Java 21
        run: |
          echo "org.gradle.java.home=$JAVA_HOME" >> android/gradle.properties

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Debug APK
        run: cd android && ./gradlew --version && ./gradlew assembleDebug

      - uses: actions/upload-artifact@v4
        with:
          name: itasuper-cliente-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

  build-parceiro:
    if: ${{ github.event.inputs.app_type == 'parceiro' || github.event.inputs.app_type == 'both' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: android-actions/setup-android@v3

      - uses: actions/setup-node@v5
        with:
          node-version: '22'

      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Verify Java 21
        run: |
          echo "JAVA_HOME=$JAVA_HOME"
          java -version
          javac -version

      - name: Install dependencies
        run: npm install

      - name: Configure Capacitor for Parceiro
        run: |
          cat > capacitor.config.ts << 'EOF'
          import type { CapacitorConfig } from '@capacitor/cli';
          const config: CapacitorConfig = {
            appId: 'app.itasuper.parceiro',
            appName: 'ItaSuper Parceiro',
            webDir: 'dist',
            server: {
              url: 'https://itasuper.com.br',
              cleartext: false
            },
            plugins: {
              SplashScreen: {
                launchAutoHide: false,
              },
            },
          };
          export default config;
          EOF
          sed -i 's/^          //' capacitor.config.ts

      - name: Inject partner redirect
        run: |
          node -e "
          const fs = require('fs');
          let html = fs.readFileSync('index.html','utf8');
          const tag = '<script>if(!window.__CAP_PARTNER_REDIRECTED){var p=window.location.pathname;if(p===\"/\"||p===\"/index.html\"||p===\"\"){window.__CAP_PARTNER_REDIRECTED=true;window.location.replace(\"/portal-parceiro\");}}</script>';
          html = html.replace('<head>','<head>'+tag);
          fs.writeFileSync('index.html',html);
          "

      - name: Build web app
        run: npm run build

      - name: Add Android platform
        run: npx cap add android || true

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Inject ItaSuper Parceiro icon
        run: |
          echo "📥 Injecting ItaSuper icon from public/icon-512x512.png"
          for res in "mipmap-mdpi:48" "mipmap-hdpi:72" "mipmap-xhdpi:96" "mipmap-xxhdpi:144" "mipmap-xxxhdpi:192"; do
            DIR="android/app/src/main/res/${res%%:*}"
            SIZE="${res##*:}"
            mkdir -p "$DIR"
            npx --yes sharp-cli -i public/icon-512x512.png -o "$DIR/ic_launcher.png" resize "$SIZE" "$SIZE" 2>/dev/null || \
              convert public/icon-512x512.png -resize "${SIZE}x${SIZE}" "$DIR/ic_launcher.png" 2>/dev/null || \
              cp public/icon-512x512.png "$DIR/ic_launcher.png"
            cp "$DIR/ic_launcher.png" "$DIR/ic_launcher_round.png"
            cp "$DIR/ic_launcher.png" "$DIR/ic_launcher_foreground.png"
          done
          echo "✅ ItaSuper Parceiro icon injected"

      - name: Set splash color
        run: |
          COLORS_FILE="android/app/src/main/res/values/colors.xml"
          if [ -f "$COLORS_FILE" ]; then
            sed -i 's|</resources>|    <color name="splash_color">#FF4B2B</color>\n</resources>|' "$COLORS_FILE"
          else
            mkdir -p "$(dirname "$COLORS_FILE")"
            echo '<?xml version="1.0" encoding="utf-8"?><resources><color name="splash_color">#FF4B2B</color></resources>' > "$COLORS_FILE"
          fi

      - name: Inject google-services.json (Parceiro)
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON_PARCEIRO }}' > android/app/google-services.json

      - name: Pin Gradle to Java 21
        run: |
          echo "org.gradle.java.home=$JAVA_HOME" >> android/gradle.properties

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Debug APK
        run: cd android && ./gradlew --version && ./gradlew assembleDebug

      - uses: actions/upload-artifact@v4
        with:
          name: itasuper-parceiro-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

  build-white-label:
    if: ${{ github.event.inputs.app_type == 'white_label' }}
    runs-on: ubuntu-latest
    steps:
      - name: Validate inputs
        run: |
          if [ -z "${{ github.event.inputs.store_slug }}" ]; then
            echo "::error::store_slug é obrigatório para white_label"
            exit 1
          fi
          if [ -z "${{ github.event.inputs.store_app_name }}" ]; then
            echo "::error::store_app_name é obrigatório para white_label"
            exit 1
          fi
          if [ -z "${{ github.event.inputs.store_app_id }}" ]; then
            echo "::error::store_app_id é obrigatório para white_label"
            exit 1
          fi

      - uses: actions/checkout@v5

      - uses: android-actions/setup-android@v3

      - uses: actions/setup-node@v5
        with:
          node-version: '22'

      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Verify Java 21
        run: |
          echo "JAVA_HOME=$JAVA_HOME"
          java -version
          javac -version

      - name: Install dependencies
        run: npm install

      - name: Configure Capacitor for Store
        env:
          STORE_SLUG: ${{ github.event.inputs.store_slug }}
          STORE_APP_NAME: ${{ github.event.inputs.store_app_name }}
          STORE_APP_ID: ${{ github.event.inputs.store_app_id }}
          SPLASH_COLOR: ${{ github.event.inputs.splash_color || '#FF4B2B' }}
        run: |
          cat > capacitor.config.ts << EOF
          import type { CapacitorConfig } from '@capacitor/cli';
          const config: CapacitorConfig = {
            appId: '${STORE_APP_ID}',
            appName: '${STORE_APP_NAME}',
            webDir: 'dist',
            server: {
              url: 'https://itasuper.com.br/${STORE_SLUG}?storeApp=true',
              cleartext: false
            },
            plugins: {
              SplashScreen: {
                launchAutoHide: false,
                backgroundColor: '${SPLASH_COLOR}',
                showSpinner: true,
                spinnerColor: '#FFFFFF',
                launchFadeOutDuration: 500,
              },
            },
          };
          export default config;
          EOF

      - name: Resolve store icon URL
        id: resolve_icon
        env:
          ICON_URL: ${{ github.event.inputs.icon_url }}
          STORE_SLUG: ${{ github.event.inputs.store_slug }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          if [ -n "$ICON_URL" ]; then
            echo "📌 Using manual icon URL"
            echo "icon_url=$ICON_URL" >> "$GITHUB_OUTPUT"
          else
            echo "🔍 Fetching store image_url from database (slug=$STORE_SLUG)..."
            RESPONSE=$(curl -s \
              "${SUPABASE_URL}/rest/v1/stores?slug=eq.${STORE_SLUG}&select=image_url&limit=1" \
              -H "apikey: ${SUPABASE_ANON_KEY}" \
              -H "Authorization: Bearer ${SUPABASE_ANON_KEY}")
            
            STORE_IMAGE=$(echo "$RESPONSE" | node -e "
              const d = JSON.parse(require('fs').readFileSync(0,'utf8'));
              const url = d?.[0]?.image_url || '';
              process.stdout.write(url);
            " 2>/dev/null || echo "")
            
            if [ -n "$STORE_IMAGE" ]; then
              echo "✅ Found store image: ${STORE_IMAGE:0:60}..."
              echo "icon_url=$STORE_IMAGE" >> "$GITHUB_OUTPUT"
            else
              echo "⚠️ No store image found, using default icon"
              echo "icon_url=" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Download and inject custom icon
        if: ${{ steps.resolve_icon.outputs.icon_url != '' }}
        env:
          ICON_URL: ${{ steps.resolve_icon.outputs.icon_url }}
        run: |
          echo "📥 Downloading store icon from $ICON_URL"
          curl -L -o /tmp/store-icon.png "$ICON_URL"

          for res in "mipmap-mdpi:48" "mipmap-hdpi:72" "mipmap-xhdpi:96" "mipmap-xxhdpi:144" "mipmap-xxxhdpi:192"; do
            DIR="android/app/src/main/res/${res%%:*}"
            SIZE="${res##*:}"
            mkdir -p "$DIR"
            convert /tmp/store-icon.png -resize "${SIZE}x${SIZE}" "$DIR/ic_launcher.png"
            cp "$DIR/ic_launcher.png" "$DIR/ic_launcher_round.png"
            cp "$DIR/ic_launcher.png" "$DIR/ic_launcher_foreground.png"
            echo "✅ ${res%%:*}: ${SIZE}x${SIZE}"
          done

          echo "🎨 Custom icon injected for all densities"

      - name: Configure splash screen color
        env:
          SPLASH_COLOR: ${{ github.event.inputs.splash_color || '#FF4B2B' }}
        run: |
          STYLES_FILE="android/app/src/main/res/values/styles.xml"
          COLORS_FILE="android/app/src/main/res/values/colors.xml"

          if [ -f "$COLORS_FILE" ]; then
            if grep -q "splash_color" "$COLORS_FILE"; then
              sed -i "s|<color name=\"splash_color\">.*</color>|<color name=\"splash_color\">${SPLASH_COLOR}</color>|" "$COLORS_FILE"
            else
              sed -i "s|</resources>|    <color name=\"splash_color\">${SPLASH_COLOR}</color>\n</resources>|" "$COLORS_FILE"
            fi
          else
            mkdir -p "$(dirname "$COLORS_FILE")"
            cat > "$COLORS_FILE" << COLEOF
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="splash_color">${SPLASH_COLOR}</color>
          </resources>
          COLEOF
          fi

          echo "🎨 Splash color set to ${SPLASH_COLOR}"

      - name: Build web app
        run: npm run build

      - name: Add Android platform
        run: npx cap add android || true

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Inject icons after sync
        if: ${{ steps.resolve_icon.outputs.icon_url != '' }}
        run: |
          echo "📥 Re-injecting icons after cap sync..."
          for res in "mipmap-mdpi:48" "mipmap-hdpi:72" "mipmap-xhdpi:96" "mipmap-xxhdpi:144" "mipmap-xxxhdpi:192"; do
            DIR="android/app/src/main/res/${res%%:*}"
            SIZE="${res##*:}"
            mkdir -p "$DIR"
            convert /tmp/store-icon.png -resize "${SIZE}x${SIZE}" "$DIR/ic_launcher.png"
            cp "$DIR/ic_launcher.png" "$DIR/ic_launcher_round.png"
            cp "$DIR/ic_launcher.png" "$DIR/ic_launcher_foreground.png"
          done
          echo "✅ Icons re-injected after sync"

      - name: Apply splash color after sync
        env:
          SPLASH_COLOR: ${{ github.event.inputs.splash_color || '#FF4B2B' }}
        run: |
          COLORS_FILE="android/app/src/main/res/values/colors.xml"
          if [ -f "$COLORS_FILE" ]; then
            if grep -q "splash_color" "$COLORS_FILE"; then
              sed -i "s|<color name=\"splash_color\">.*</color>|<color name=\"splash_color\">${SPLASH_COLOR}</color>|" "$COLORS_FILE"
            else
              sed -i "s|</resources>|    <color name=\"splash_color\">${SPLASH_COLOR}</color>\n</resources>|" "$COLORS_FILE"
            fi
          else
            cat > "$COLORS_FILE" << COLEOF
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="splash_color">${SPLASH_COLOR}</color>
          </resources>
          COLEOF
          fi

      - name: Inject google-services.json (White Label)
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON_CLIENTE }}' > android/app/google-services.json

      - name: Pin Gradle to Java 21
        run: |
          echo "org.gradle.java.home=$JAVA_HOME" >> android/gradle.properties

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Debug APK
        run: cd android && ./gradlew --version && ./gradlew assembleDebug

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.store_slug }}-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
